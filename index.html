<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingão das Mães 2026 - Operador</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* TRAVA GLOBAL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(180deg, #e6005c 0%, #ff0066 20%, #ff1a8c 50%, #ff3385 80%, #e6005c 100%);
            display: flex; flex-direction: column; align-items: center;
            padding: 1.5vh 1.5vw; color: white;
            height: 100vh; overflow: hidden; /* Trava a rolagem na tela do PC */
        }
        
        .header { text-align: center; width: 100%; flex-shrink: 0; padding-bottom: 1vh; }
        .header h1 { font-size: 3.5vh; font-weight: 900; color: #ffd700; text-shadow: 2px 2px 0px #b30047; }
        
        .main-container { 
            display: flex; gap: 1.5vw; width: 100%; flex: 1; 
            min-height: 0; /* Essencial para a barra de rolagem funcionar */
        }

        /* LADO ESQUERDO: GRADE DE NÚMEROS */
        .grid-container {
            flex: 1.4; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px);
            border-radius: 2vh; padding: 1.5vh; border: 2px solid rgba(255, 255, 255, 0.3);
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(5, 1fr);
            gap: 0.8vh; min-height: 0;
        }
        .number-cell {
            background: white; color: #e6005c; border-radius: 1vh;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.8vh; font-weight: 900; cursor: pointer; border: none;
            box-shadow: 0 4px 0px #ccc; transition: all 0.1s;
        }
        .number-cell.marked { background: #ffd700; color: #800033; box-shadow: 0 4px 0px #ccac00; }
        .number-cell.last-marked { border: 0.5vh solid #ff1a8c; box-shadow: 0 0 15px #ffd700; }

        /* LADO DIREITO: PAINEL DE CONTROLE */
        .side-panel { 
            flex: 0.6; display: flex; flex-direction: column; gap: 1.5vh; 
            min-width: 350px; min-height: 0; 
        }
        
        .card { 
            background: white; border-radius: 2vh; padding: 1.5vh; color: #e6005c; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            display: flex; flex-direction: column;
        }
        
        /* O SEGREDO DA BARRA DE ROLAGEM AQUI */
        .card-prizes { flex: 1; min-height: 0; } 
        
        .card-title { font-size: 1.6vh; font-weight: 900; text-transform: uppercase; margin-bottom: 1vh; opacity: 0.7; border-bottom: 1px solid #eee; padding-bottom: 0.5vh; flex-shrink: 0; }

        /* Lista de Prêmios - Rola Apenas Aqui Dentro */
        .prize-list-container { 
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; 
            gap: 0.8vh; padding-right: 5px; min-height: 0;
        }
        .prize-item {
            background: #f8f8f8; border: 2px solid #eee; padding: 1.2vh; border-radius: 1vh;
            cursor: pointer; font-weight: 700; font-size: 1.8vh; transition: all 0.2s;
            display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .prize-item:hover { border-color: #ff1a8c; background: #fff0f6; }
        .prize-item.active { background: #ffd700; border-color: #b39700; color: #800033; transform: scale(1.02); }
        
        .edit-prizes-area { display: none; flex-direction: column; gap: 1vh; flex: 1; min-height: 0; }
        .edit-prizes-area textarea { flex: 1; padding: 1vh; border-radius: 1vh; border: 2px solid #ccc; font-family: inherit; resize: none; }

        .last-num-display { font-size: 9vh; font-weight: 900; text-align: center; line-height: 1; }

        .btn {
            padding: 1.2vh; border-radius: 1vh; border: none; font-family: inherit;
            font-weight: 900; font-size: 1.6vh; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s; color: white;
        }
        .btn-edit { background: #555; width: 100%; margin-top: 1vh; flex-shrink: 0; }
        .btn-save { background: #00cc66; flex-shrink: 0;}
        .btn-reset { background: #ff3333; }
        .btn-undo { background: #888; }
        
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1vh; flex-shrink: 0; }

        /* Estiliza a barra de rolagem */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #e6005c; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #b30047; }


        /* =========================================
           MODO CELULAR / TELAS PEQUENAS (Responsivo)
           ========================================= */
        @media (max-width: 900px), (orientation: portrait) {
            body { 
                height: auto; min-height: 100vh; 
                overflow-y: auto; /* Libera rolagem geral na tela do celular */
                display: block; padding: 2vh 3vw;
            }
            .main-container { flex-direction: column; gap: 2vh; }
            
            .grid-container {
                /* Inverte para 5 colunas x 15 linhas no celular */
                grid-template-columns: repeat(5, 1fr); 
                grid-template-rows: repeat(15, 1fr);
                height: 75vh; /* Ocupa a primeira tela toda */
                flex: none;
            }
            
            .side-panel { width: 100%; min-width: 100%; flex: none; gap: 2vh; }
            
            .card-prizes { height: 40vh; /* Tamanho fixo da lista no celular */ }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>PAINEL DE CONTROLE</h1>
    </div>

    <div class="main-container">
        <div class="grid-container" id="grid"></div>

        <div class="side-panel">
            
            <div class="card card-prizes">
                <div class="card-title">🏆 PRÊMIOS DO SORTEIO</div>
                
                <div id="prize-view" class="prize-list-container"></div>

                <div id="prize-edit" class="edit-prizes-area">
                    <textarea id="prizes-input" placeholder="Cole sua lista aqui..."></textarea>
                    <button class="btn btn-save" onclick="savePrizeList()">Salvar Lista</button>
                </div>
                
                <button class="btn btn-edit" id="toggle-edit" onclick="toggleEdit()">Configurar Prêmios</button>
            </div>

            <div class="card" style="flex-shrink: 0;">
                <div class="card-title">📍 ÚLTIMO SORTEADO</div>
                <div class="last-num-display" id="last-number">--</div>
                <div style="text-align: center; font-weight: bold; margin-top: 1vh;">
                    Total: <span id="count">0</span>/75
                </div>
            </div>

            <div class="controls-grid">
                <button class="btn btn-undo" onclick="undoLast()">Desfazer</button>
                <button class="btn btn-reset" onclick="resetBingo()">Reset Tudo</button>
                
                <button class="btn" style="background: #ff1a8c; grid-column: span 2;" onclick="window.open('telao.html', '_blank')">📱 Abrir Telão (Celular)</button>
                
                <button class="btn" style="background: #00cc66;" onclick="window.open('telao_led.html', '_blank')">💻 Telão (LED)</button>
                <button class="btn" style="background: #007bff;" onclick="window.open('qrcode.html', '_blank')">📷 QR Code</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXSigj-nvpEykiXA53dKHBwCiE77BE5V4",
            authDomain: "bingaomaes.firebaseapp.com",
            projectId: "bingaomaes",
            storageBucket: "bingaomaes.firebasestorage.app",
            messagingSenderId: "1080021616743",
            appId: "1:1080021616743:web:31ce8cad4e0f45f35d6cc2",
            databaseURL: "https://bingaomaes-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const bingoRef = ref(db, 'bingo_status');

        let state = {
            history: [],
            current_prize: "",
            prize_list: "1º Prêmio\n2º Prêmio\n3º Prêmio\nCartela Cheia"
        };

        onValue(bingoRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state = { ...state, ...data };
            }
            renderAll();
        });

        function renderAll() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 75; i++) {
                const btn = document.createElement('button');
                btn.className = 'number-cell';
                if (state.history.includes(i)) btn.classList.add('marked');
                if (state.history[state.history.length-1] === i) btn.classList.add('last-marked');
                btn.textContent = i;
                btn.onclick = () => toggleNumber(i);
                grid.appendChild(btn);
            }

            const prizeView = document.getElementById('prize-view');
            prizeView.innerHTML = '';
            const list = state.prize_list.split('\n').filter(p => p.trim() !== "");
            list.forEach(p => {
                const item = document.createElement('div');
                item.className = 'prize-item' + (state.current_prize === p ? ' active' : '');
                item.innerHTML = `<span>${p}</span> ${state.current_prize === p ? '✅' : ''}`;
                item.onclick = () => setPrize(p);
                prizeView.appendChild(item);
            });

            document.getElementById('last-number').textContent = state.history.length > 0 ? state.history[state.history.length-1] : '--';
            document.getElementById('count').textContent = state.history.length;
            document.getElementById('prizes-input').value = state.prize_list;
        }

        function sync() {
            set(bingoRef, state);
        }

        window.toggleNumber = (num) => {
            const idx = state.history.indexOf(num);
            if (idx > -1) state.history.splice(idx, 1);
            else state.history.push(num);
            sync();
        };

        window.setPrize = (name) => {
            state.current_prize = name;
            sync();
        };

        window.savePrizeList = () => {
            state.prize_list = document.getElementById('prizes-input').value;
            toggleEdit();
            sync();
        };

        window.toggleEdit = () => {
            const view = document.getElementById('prize-view');
            const edit = document.getElementById('prize-edit');
            const btn = document.getElementById('toggle-edit');
            if (view.style.display === 'none') {
                view.style.display = 'flex';
                edit.style.display = 'none';
                btn.textContent = 'Configurar Prêmios';
            } else {
                view.style.display = 'none';
                edit.style.display = 'flex';
                btn.textContent = 'Cancelar';
            }
        };

        window.undoLast = () => {
            state.history.pop();
            sync();
        };

        window.resetBingo = () => {
            if (confirm("Deseja zerar o sorteio atual?")) {
                state.history = [];
                state.current_prize = "";
                sync();
            }
        };
    </script>
</body>
</html>
