<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingão das Mães 2026 - Operador</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; height: 100dvh; overflow: hidden; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(180deg, #e6005c 0%, #ff0066 20%, #ff1a8c 50%, #ff3385 80%, #e6005c 100%);
            display: flex; flex-direction: column; align-items: center;
            padding: 1vh 1.5vw; color: white;
        }
        .header { text-align: center; width: 100%; flex-shrink: 0; padding-bottom: 1vh; }
        .header h1 { font-size: 3.5vh; font-weight: 900; color: #ffd700; text-shadow: 2px 2px 0px #b30047; }
        
        .main-container { display: flex; gap: 1.5vw; width: 100%; flex: 1; min-height: 0; }

        /* Grade de Números */
        .grid-container {
            flex: 1.2; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px);
            border-radius: 2vh; padding: 1.5vh; border: 2px solid rgba(255, 255, 255, 0.3);
            display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(5, 1fr);
            gap: 0.8vh;
        }
        .number-cell {
            background: white; color: #e6005c; border-radius: 1vh;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.8vh; font-weight: 900; cursor: pointer; border: none;
            box-shadow: 0 4px 0px #ccc; transition: all 0.1s;
        }
        .number-cell.marked { background: #ffd700; color: #800033; box-shadow: 0 4px 0px #ccac00; }
        .number-cell.last-marked { border: 0.5vh solid #ff1a8c; box-shadow: 0 0 15px #ffd700; }

        /* Painel Lateral */
        .side-panel { flex: 0.8; display: flex; flex-direction: column; gap: 1.5vh; min-width: 300px; }
        
        .card { background: white; border-radius: 2vh; padding: 1.5vh; color: #e6005c; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card-title { font-size: 1.6vh; font-weight: 900; text-transform: uppercase; margin-bottom: 1vh; opacity: 0.7; border-bottom: 1px solid #eee; padding-bottom: 0.5vh; }

        /* Lista de Prêmios */
        .prize-list-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0.8vh; padding-right: 5px; }
        .prize-item {
            background: #f8f8f8; border: 2px solid #eee; padding: 1.2vh; border-radius: 1vh;
            cursor: pointer; font-weight: 700; font-size: 1.8vh; transition: all 0.2s;
            display: flex; align-items: center; justify-content: space-between;
        }
        .prize-item:hover { border-color: #ff1a8c; background: #fff0f6; }
        .prize-item.active { background: #ffd700; border-color: #b39700; color: #800033; transform: scale(1.02); }
        
        .edit-prizes-area { display: none; flex-direction: column; gap: 1vh; }
        .edit-prizes-area textarea { height: 20vh; padding: 1vh; border-radius: 1vh; border: 2px solid #ccc; font-family: inherit; resize: none; }

        .last-num-display { font-size: 10vh; font-weight: 900; text-align: center; line-height: 1; }

        .btn {
            padding: 1.2vh; border-radius: 1vh; border: none; font-family: inherit;
            font-weight: 900; font-size: 1.6vh; cursor: pointer; text-transform: uppercase;
            transition: all 0.2s; color: white;
        }
        .btn-edit { background: #555; width: 100%; margin-top: 1vh; }
        .btn-save { background: #00cc66; }
        .btn-reset { background: #ff3333; }
        .btn-undo { background: #888; }
        
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1vh; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PAINEL DE CONTROLE</h1>
    </div>

    <div class="main-container">
        <div class="grid-container" id="grid"></div>

        <div class="side-panel">
            
            <div class="card" style="flex: 1; display: flex; flex-direction: column;">
                <div class="card-title">🏆 PRÊMIOS DO SORTEIO</div>
                
                <div id="prize-view" class="prize-list-container">
                    </div>

                <div id="prize-edit" class="edit-prizes-area">
                    <textarea id="prizes-input" placeholder="Cole sua lista aqui...&#10;Ex:&#10;1º Prêmio - R$ 500&#10;2º Prêmio - Fogão&#10;Cartela Cheia - R$ 2.000"></textarea>
                    <button class="btn btn-save" onclick="savePrizeList()">Salvar Lista</button>
                </div>
                
                <button class="btn btn-edit" id="toggle-edit" onclick="toggleEdit()">Configurar Prêmios</button>
            </div>

            <div class="card">
                <div class="card-title">📍 ÚLTIMO SORTEADO</div>
                <div class="last-num-display" id="last-number">--</div>
                <div style="text-align: center; font-weight: bold; margin-top: 1vh;">
                    Total: <span id="count">0</span>/75
                </div>
            </div>

            <div class="controls-grid">
    <button class="btn btn-undo" onclick="undoLast()">Desfazer</button>
    <button class="btn btn-reset" onclick="resetBingo()">Reset Tudo</button>
    
    <button class="btn" style="background: #00ff00;" onclick="window.open('telao_led.html', '_blank')">💻 Abrir Telão LED</button>
    <button class="btn" style="background: #007bff;" onclick="window.open('qrcode.html', '_blank')">📱 Abrir QR Code</button>
</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXSigj-nvpEykiXA53dKHBwCiE77BE5V4",
            authDomain: "bingaomaes.firebaseapp.com",
            projectId: "bingaomaes",
            storageBucket: "bingaomaes.firebasestorage.app",
            messagingSenderId: "1080021616743",
            appId: "1:1080021616743:web:31ce8cad4e0f45f35d6cc2",
            databaseURL: "https://bingaomaes-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const bingoRef = ref(db, 'bingo_status');

        let state = {
            history: [],
            current_prize: "",
            prize_list: "1º Prêmio\n2º Prêmio\n3º Prêmio\nCartela Cheia"
        };

        // Carrega dados
        onValue(bingoRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                state = { ...state, ...data };
            }
            renderAll();
        });

        function renderAll() {
            // Renderiza Números
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 75; i++) {
                const btn = document.createElement('button');
                btn.className = 'number-cell';
                if (state.history.includes(i)) btn.classList.add('marked');
                if (state.history[state.history.length-1] === i) btn.classList.add('last-marked');
                btn.textContent = i;
                btn.onclick = () => toggleNumber(i);
                grid.appendChild(btn);
            }

            // Renderiza Prêmios
            const prizeView = document.getElementById('prize-view');
            prizeView.innerHTML = '';
            const list = state.prize_list.split('\n').filter(p => p.trim() !== "");
            list.forEach(p => {
                const item = document.createElement('div');
                item.className = 'prize-item' + (state.current_prize === p ? ' active' : '');
                item.innerHTML = `<span>${p}</span> ${state.current_prize === p ? '✅' : ''}`;
                item.onclick = () => setPrize(p);
                prizeView.appendChild(item);
            });

            document.getElementById('last-number').textContent = state.history.length > 0 ? state.history[state.history.length-1] : '--';
            document.getElementById('count').textContent = state.history.length;
            document.getElementById('prizes-input').value = state.prize_list;
        }

        function sync() {
            set(bingoRef, state);
        }

        window.toggleNumber = (num) => {
            const idx = state.history.indexOf(num);
            if (idx > -1) state.history.splice(idx, 1);
            else state.history.push(num);
            sync();
        };

        window.setPrize = (name) => {
            state.current_prize = name;
            sync();
        };

        window.savePrizeList = () => {
            state.prize_list = document.getElementById('prizes-input').value;
            toggleEdit();
            sync();
        };

        window.toggleEdit = () => {
            const view = document.getElementById('prize-view');
            const edit = document.getElementById('prize-edit');
            const btn = document.getElementById('toggle-edit');
            if (view.style.display === 'none') {
                view.style.display = 'flex';
                edit.style.display = 'none';
                btn.textContent = 'Configurar Prêmios';
            } else {
                view.style.display = 'none';
                edit.style.display = 'flex';
                btn.textContent = 'Cancelar';
            }
        };

        window.undoLast = () => {
            state.history.pop();
            sync();
        };

        window.resetBingo = () => {
            if (confirm("Deseja zerar o sorteio atual?")) {
                state.history = [];
                state.current_prize = "";
                sync();
            }
        };
    </script>
</body>
</html>
