<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO LED - 4x2 Contrast (Ajuste Fino)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        /* TRAVA GLOBAL */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #e6005c; 
            height: 100vh; width: 100vw; 
            overflow: hidden; 
            display: flex; flex-direction: column; 
            padding: 1vh 2vw; /* Reduzi o padding vertical para liberar mais espaço pra grade */
        }

        .main-content { 
            display: flex; flex: 1; gap: 2vw; 
            min-height: 0; width: 100%; 
        }

        /* LADO ESQUERDO: BINGO + GRADE */
        .bingo-section {
            flex: 1.5; display: flex; flex-direction: column; min-height: 0;
        }

        /* CABEÇALHO BINGO */
        .bingo-header {
            display: grid; grid-template-columns: repeat(5, 1fr); 
            gap: 0.5vh; /* Reduzi o espaço entre as letras */
            margin-bottom: 0.5vh; flex-shrink: 0;
        }
        .letter {
            text-align: center; 
            font-size: 9vh; /* Letra levemente ajustada */
            color: #ffd700; line-height: 1;
            text-shadow: 0.4vh 0.4vh 0px #000;
        }

        /* GRADE DE NÚMEROS */
        .grid {
            flex: 1; display: grid; grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(15, 1fr); 
            gap: 0.5vh; min-height: 0; /* Espaço entre as bolinhas menor para não empurrar a tela */
        }
        
        .num {
            background: rgba(0, 0, 0, 0.2); 
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5vh; /* Fonte pouquinha coisa menor para não vazar a caixa */
            font-weight: 900; color: rgba(255,255,255,0.2);
            border-radius: 0.6vh; border: 0.2vh solid rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .num.active {
            background: #fff !important; color: #000 !important;
            border: 0.3vh solid #000; transform: scale(1.02);
        }

        .num.last {
            background: #ffd700 !important; color: #000 !important;
            border: 0.4vh solid #fff; animation: blink 0.8s infinite;
        }

        /* LADO DIREITO: PAINEL DE INFORMAÇÕES */
        .side-info { 
            flex: 0.6; display: flex; flex-direction: column; 
            gap: 1.5vh; min-height: 0; 
        }
        
        .box {
            background: rgba(0,0,0,0.3); border: 0.6vh solid #ffd700;
            border-radius: 2vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
            padding: 1vh; /* Padding interno menor */
        }
        .prize-box { flex: 0.4; }
        .last-box { flex: 0.6; }

        .label { 
            font-size: 2.5vh; color: #fff; text-transform: uppercase; 
            margin-bottom: 0.5vh; font-weight: 700; 
        }
        .val-prize { 
            font-size: 4.5vh; color: #ffd700; font-weight: 900; 
            text-shadow: 0.4vh 0.4vh 0 #000; line-height: 1.1; 
        }
        .val-last { 
            font-size: 22vh; /* Reduzi o número gigante para ele não esticar a caixa toda */
            color: #fff; font-weight: 900; 
            text-shadow: 1vh 1vh 0 #000; line-height: 1; 
        }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* OVERLAY GIGANTE (PISCA NO SORTEIO) */
        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.95); z-index: 1000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .overlay.show { display: flex; }
        .big-num { 
            font-size: 70vh; color: #fff; font-weight: 900;
            text-shadow: 2vh 2vh 0 #e6005c; line-height: 1;
        }
    </style>
</head>
<body>
    
    <div class="main-content">
        <div class="bingo-section">
            <div class="bingo-header">
                <div class="letter">B</div><div class="letter">I</div><div class="letter">N</div><div class="letter">G</div><div class="letter">O</div>
            </div>
            <div class="grid" id="grid"></div>
        </div>

        <div class="side-info">
            <div class="box prize-box">
                <div class="label">Valendo:</div>
                <div class="val-prize" id="prize-text">---</div>
            </div>
            <div class="box last-box">
                <div class="label">Sorteado:</div>
                <div class="val-last" id="side-last">--</div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay">
        <div class="big-num" id="big-num">--</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXSigj-nvpEykiXA53dKHBwCiE77BE5V4",
            authDomain: "bingaomaes.firebaseapp.com",
            projectId: "bingaomaes",
            storageBucket: "bingaomaes.firebasestorage.app",
            messagingSenderId: "1080021616743",
            appId: "1:1080021616743:web:31ce8cad4e0f45f35d6cc2",
            databaseURL: "https://bingaomaes-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const bingoRef = ref(db, 'bingo_status');

        const grid = document.getElementById('grid');
        let prevLast = null;

        function createGrid() {
            grid.innerHTML = '';
            for(let r=0; r<15; r++) {
                for(let c=0; c<5; c++) {
                    const n = (c*15)+(r+1);
                    const d = document.createElement('div');
                    d.className = 'num'; d.id = 'n'+n; d.textContent = n;
                    grid.appendChild(d);
                }
            }
        }

        onValue(bingoRef, (snap) => {
            const data = snap.val();
            if(!data) return;
            
            const history = data.history || [];
            const last = history[history.length-1];

            document.querySelectorAll('.num').forEach(el => el.classList.remove('active', 'last'));
            history.forEach(n => document.getElementById('n'+n).classList.add('active'));
            
            if(last) {
                document.getElementById('n'+last).classList.add('last');
                document.getElementById('side-last').textContent = last;
                if(last !== prevLast) {
                    showOverlay(last);
                    prevLast = last;
                }
            }
            document.getElementById('prize-text').textContent = data.current_prize || "SORTEIO";
        });

        function showOverlay(n) {
            const ov = document.getElementById('overlay');
            document.getElementById('big-num').textContent = n;
            ov.classList.add('show');
            setTimeout(() => ov.classList.remove('show'), 3000);
        }

        createGrid();
    </script>
</body>
</html>
