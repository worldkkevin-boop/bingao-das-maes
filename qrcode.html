<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ACOMPANHAR BINGO - QR CODE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            /* Fundo rosa para combinar com o tema do evento */
            background: #e6005c; 
            color: white; 
            font-family: 'Montserrat', sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            height: 100vh; 
            margin: 0; 
            text-align: center;
        }
        .qr-card {
            background: white; 
            padding: 40px; 
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            margin: 20px 0;
        }
        h1 { 
            font-size: 60px; 
            text-transform: uppercase;
            color: #ffd700;
            text-shadow: 4px 4px 0 #000; 
        }
        p { 
            font-size: 30px; 
            font-weight: bold; 
            text-shadow: 2px 2px 0 #000;
        }
        img { 
            width: 450px; 
            height: 450px; 
        }
    </style>
</head>
<body>
    
    <h1>ACOMPANHE O BINGO</h1>
    
    <div class="qr-card">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https://worldkkevin-boop.github.io/bingao-das-maes/telao.html" alt="QR Code do Bingo">
    </div>

    <p>Aponte a câmera do celular para a tela!</p>

</body>
</html>
